{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">👥 Registered Voters</h2>

{% if voters %}
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Registered On</th>
        </tr>
    </thead>
    <tbody>
    {% for v in voters %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ v.name }}</td>
            <td>{{ v.email }}</td>
            <td>{{ v.created_at.strftime('%d %b %Y') }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted">No voters registered yet.</p>
{% endif %}
{% endblock %}
